agent_id: secrets_custodian
name: Secrets Custodian
model_tier: local-small
capabilities:
  - credential-audit
  - secret-verification
  - store-consistency
  - permission-monitoring
description: >
  Librarian and janitor for credentials across all OsMEN-OC stores
  (env file, SOPS, Podman secrets, OpenClaw SecretRefs, CLI keystores).
  Audits on schedule, flags drift, and verifies store consistency.
  Does NOT create or store secrets — only inventories, verifies, and reports.

schedule:
  cron: "0 6 * * *"
  on_event: "events:secrets:audit_requested"

tools:
  - name: audit_secrets
    description: >
      Run all audit checks across every credential store and return an
      aggregated report. Checks: env file permissions, env completeness vs
      registry, Podman secret existence, SOPS file presence, SOPS dir
      permissions, template drift, git history leak scan.
    parameters: {}
    risk_level: low

  - name: verify_env_file
    description: >
      Verify the runtime env file exists at ~/.config/osmen/env, has
      chmod 600 permissions, and contains all variables declared in the
      secrets registry. Returns per-variable findings.
    parameters: {}
    risk_level: low

  - name: verify_podman_secrets
    description: >
      List existing Podman secrets and compare against the secrets registry.
      Reports any declared Podman secrets that are missing from the store.
    parameters: {}
    risk_level: low

  - name: verify_sops_files
    description: >
      Check that every SOPS-encrypted file referenced in the registry
      exists under ~/.config/osmen/secrets/ and that the SOPS directory
      has owner-only (700) permissions.
    parameters: {}
    risk_level: low

  - name: verify_openclaw_refs
    description: >
      Run 'openclaw secrets audit' (with env vars sourced) and parse
      the output for plaintext secrets, unresolved refs, or legacy
      residue. Requires env file loaded in process environment.
    parameters: {}
    risk_level: low
