# STT Configuration (post-lemonade migration)
stt:
  # Primary engine: KokoroTTS (lemonade-based)
  engine: kokoro
  model_size: small
  device: cuda  # Prefer NVIDIA for speed
  compute_type: float16
  language: null  # Auto-detect
  beam_size: 5
  vad_filter: true

  # Legacy engine options (still available via aliases)
  whisper:
    model_size: small
    device: cpu
    compute_type: int8
