# Compute routing rules for OsMEN-OC.
# Defines which compute resource handles each workload type.
# Managed by the system_monitor agent via get_compute_routing,
# set_compute_routing, and intake_compute_routing tools.
#
# Rule evaluation order: highest priority first.
# First matching rule wins. If no rule matches, the default_compute is used.
#
# target_compute values:
#   nvidia     — NVIDIA dGPU via CUDA (Ollama, port 11434)
#   amd_vulkan — AMD iGPU via Vulkan (LM Studio port 1234, Lemonade llamacpp:vulkan port 13305)
#   npu        — AMD XDNA 2 NPU via FLM (Lemonade flm:npu port 13305)
#   cpu        — CPU-only (Lemonade llamacpp:cpu port 13305)
#
# Verified inference providers (Phase 8):
#   Ollama 0.20.3 (native)     → 127.0.0.1:11434  CUDA/NVIDIA   4 models
#   LM Studio (native)         → 127.0.0.1:1234   Vulkan/AMD    9 models
#   Lemonade Server 10.2.0     → 127.0.0.1:13305  Vulkan+NPU+CPU
#
# Verified performance (Qwen3-0.6B, P8 benchmarks):
#   Vulkan (AMD 780M):  77.96 tok/s decode, 24.61 tok/s prefill
#   NPU    (XDNA2):     73.35 tok/s decode, 56.40 tok/s prefill
#   CUDA   (RTX 5070):  primary provider, measured separately per model
#
# Hardware: RTX 5070 8GB CUDA | Radeon 780M Vulkan | XDNA2 NPU | Ryzen AI 9 365

version: 2

# Fallback when no rule matches.
default_compute: cpu

rules:
  - id: gaming_process_nvidia
    description: >
      Route GPU workloads to NVIDIA when a known Windows game process
      (via Proton/Wine) is detected. Games typically perform best on the
      discrete NVIDIA dGPU.
    trigger:
      process_names:
        - ffxiv_dx11.exe
        - ffxiv_dx9.exe
        - GenshinImpact.exe
        - eldenring.exe
    action:
      target_compute: nvidia
    priority: 20

  - id: inference_large_model_nvidia
    description: >
      Large LLM inference (model VRAM >= 8 GiB) is routed to the NVIDIA
      dGPU via CUDA for maximum throughput.
    trigger:
      task_type: inference
      model_size_gb_min: 8
    action:
      target_compute: nvidia
    priority: 15

  - id: inference_medium_model_npu
    description: >
      Medium LLM inference (model VRAM 2–8 GiB) is routed to the NPU
      for power-efficient execution. Falls back to amd_vulkan if NPU is
      unavailable. Requires amdxdna driver and XRT runtime.
    trigger:
      task_type: inference
      model_size_gb_min: 2
      model_size_gb_max: 8
    action:
      target_compute: npu
      fallback: amd_vulkan
    priority: 12

  - id: inference_small_model_npu
    description: >
      Small LLM and embedding inference (< 2 GiB) runs on the NPU.
      Falls back to amd_vulkan (Radeon iGPU) if NPU is unavailable.
    trigger:
      task_type: inference
      model_size_gb_max: 2
    action:
      target_compute: npu
      fallback: amd_vulkan
    priority: 10

  - id: embedding_npu
    description: >
      Embedding generation (e.g. ChromaDB ingest, sentence-transformers)
      uses the NPU for continuous low-power operation.
    trigger:
      task_type: embedding
    action:
      target_compute: npu
      fallback: amd_vulkan
    priority: 8

  - id: transcription_npu
    description: >
      Audio transcription (Whisper v3 Turbo) runs on the NPU via FLM for
      power-efficient always-on transcription. The whisper-v3:turbo FLM
      model is preloaded. Falls back to NVIDIA CUDA if NPU is unavailable.
    trigger:
      task_type: transcription
    action:
      target_compute: npu
      fallback: nvidia
    priority: 10

  - id: rendering_amd_vulkan
    description: >
      Desktop rendering, screen capture, and display compositing use the
      AMD Radeon iGPU via Vulkan. The iGPU is connected to all display
      outputs on this hybrid GPU configuration.
    trigger:
      task_type: rendering
    action:
      target_compute: amd_vulkan
    priority: 18

  - id: vision_npu
    description: >
      Multimodal vision (image analysis, OCR, visual Q&A) runs on the NPU
      via qwen3.5-4b-FLM. Falls back to GLM-4.5V cloud if NPU unavailable
      or local inference fails.
    trigger:
      task_type: vision
    action:
      target_compute: npu
      fallback: cloud
      provider: lemonade
      model: qwen3.5-4b-FLM
      cloud_fallback_model: glm-4.5v
    priority: 10

  - id: image_generation_cpu
    description: >
      Image generation via sd-cpp runs on CPU. On-demand only — the server
      starts when needed and stops after idle timeout. SD-Turbo is the
      default model for speed; Flux-2-Klein-4B for quality.
    trigger:
      task_type: image_generation
    action:
      target_compute: cpu
      provider: lemonade
      recipe: sd-cpp
      model: SD-Turbo
    priority: 5

  - id: cpu_fallback
    description: >
      When all GPU/NPU resources are at capacity or unavailable, fall back
      to CPU-only inference via Lemonade llamacpp:cpu backend.
    trigger:
      task_type: inference
      condition: all_gpu_busy
    action:
      target_compute: cpu
      provider: lemonade
    priority: 1

# ─── Provider endpoint map ──────────────────────────────────────────────
# Used by core/inference/router.py for endpoint resolution.
# All providers expose OpenAI-compatible APIs (/v1/chat/completions,
# /v1/embeddings, /v1/audio/transcriptions, /v1/audio/speech).

providers:
  ollama:
    base_url: "http://127.0.0.1:11434"
    api_style: ollama
    compute: nvidia

  lm_studio:
    base_url: "http://127.0.0.1:1234"
    api_style: openai
    compute: amd_vulkan

  lemonade:
    base_url: "http://127.0.0.1:13305"
    api_style: openai
    backends:
      vulkan:  { compute: amd_vulkan, recipe: llamacpp }
      npu:     { compute: npu, recipe: flm }
      cpu:     { compute: cpu, recipe: llamacpp }
      kokoro:  { compute: cpu, recipe: kokoro }

  cloud_zai:
    base_url: "https://api.z.ai/api/coding/paas/v4"
    api_style: openai
    compute: cloud

# ─── Model Storage ──────────────────────────────────────────────────────
# Four independent storage silos (formats are not interchangeable):
#   /usr/share/ollama/.ollama/models/       14 GB   GGUF blobs       (user: ollama)
#   /var/lib/lemonade/.config/flm/models/   10 GB   FLM/NPU2 compiled (user: lemonade)
#   /var/lib/lemonade/.cache/huggingface/   22 GB   GGUF + ONNX files (user: lemonade)
#   ~/.lmstudio/models/                     52 GB   GGUF files        (user: dwill)

# ─── Model Tiers ────────────────────────────────────────────────────────
# Each capability type has Small / Medium / Large tiers mapped to
# hardware backends. The inference router selects a model based on:
#   1. Task type (chat, code, embed, transcribe, tts, vision)
#   2. Required capability tier (S/M/L based on quality needs)
#   3. Available compute (NPU > Vulkan > CUDA > CPU, unless task demands GPU)
#
# Columns: model, params, format, footprint, compute backends, status
#
# Legend:
#   ✓ = downloaded & ready    ○ = available in catalog (not downloaded)
#   NPU = XDNA2 via FLM      VK = Vulkan via llamacpp
#   CUDA = RTX 5070 via Ollama  CPU = llamacpp:cpu
#   ONNX = ONNX Runtime (CPU/CUDA)

model_tiers:

  # ── Chat / Reasoning ──────────────────────────────────────────────────
  chat:
    small:
      # Swarm tier: tagging, dedup detection, summary compression, watchdog
      # Budget: < 50ms/call, always-warm on NPU
      - id: qwen3-0.6b-FLM
        params: 0.6B
        quant: none
        footprint_gb: 0.66
        backends: [npu]
        status: installed
        provider: lemonade
      - id: qwen3.5:2b
        params: 2.3B
        quant: Q8_0
        footprint_gb: 2.7
        backends: [cuda]
        status: installed
        provider: ollama

    medium:
      # Worker tier: drafting, structured critique, evidence extraction, tool calls
      - id: qwen3-tk-4b-FLM
        params: 4B
        quant: Q4_1
        footprint_gb: 3.1
        labels: [reasoning, tool-calling]
        backends: [npu]
        status: installed
        provider: lemonade
      - id: qwen3.5-4b-FLM
        params: 4B
        quant: Q4_1
        footprint_gb: 5.2
        labels: [vision, reasoning, tool-calling]
        backends: [npu]
        status: installed
        provider: lemonade
      - id: llama3.2:3b
        params: 3.2B
        quant: Q4_K_M
        footprint_gb: 2.0
        backends: [cuda]
        status: installed
        provider: ollama
        note: "outclassed by qwen3.5:2b — candidate for removal"

    large:
      # Heavy local tier: synthesis, complex reasoning, code generation
      - id: gemma4:latest
        params: 8B
        quant: Q4_K_M
        footprint_gb: 9.6
        backends: [cuda]
        status: installed
        provider: ollama
      - id: Qwen3-Coder-30B-A3B-Instruct-GGUF
        params: 30B-MoE
        quant: Q4_K_M
        footprint_gb: 18.6
        labels: [coding, tool-calling]
        backends: [vulkan, cpu]
        status: installed
        provider: lemonade
      - id: GLM-4.7-Flash-GGUF
        params: 9B
        quant: Q4_K_M
        footprint_gb: 18.1
        backends: [vulkan]
        status: installed
        provider: lm_studio
      - id: gemma-4-26B-A4B-it-GGUF
        params: 26B-MoE
        quant: Q4_K_M
        footprint_gb: 16.8
        labels: [vision]
        backends: [vulkan]
        status: installed
        provider: lm_studio
      - id: LFM2-24B-A2B-GGUF
        params: 24B-MoE
        quant: Q4_K_M
        footprint_gb: 14.4
        backends: [vulkan]
        status: installed
        provider: lm_studio

  # ── Chat: available but not downloaded ─────────────────────────────
  chat_available:
    small:
      - { id: qwen3.5-0.8b-FLM,    params: 0.8B,  backends: [npu],    provider: lemonade }
      - { id: gemma3-1b-FLM,        params: 1B,    backends: [npu],    provider: lemonade }
      - { id: llama3.2-1b-FLM,      params: 1B,    backends: [npu],    provider: lemonade }
      - { id: lfm2.5-it-1.2b-FLM,   params: 1.2B,  backends: [npu],    provider: lemonade }
      - { id: lfm2.5-tk-1.2b-FLM,   params: 1.2B,  backends: [npu],    provider: lemonade }
    medium:
      - { id: qwen3-1.7b-FLM,       params: 1.7B,  backends: [npu],    provider: lemonade }
      - { id: qwen3.5-2b-FLM,       params: 2B,    backends: [npu],    provider: lemonade }
      - { id: llama3.2-3b-FLM,      params: 3B,    backends: [npu],    provider: lemonade }
      - { id: nanbeige4.1-3b-FLM,   params: 3B,    backends: [npu],    provider: lemonade }
      - { id: qwen3-4b-FLM,         params: 4B,    backends: [npu],    provider: lemonade }
      - { id: phi4-mini-it-4b-FLM,  params: 4B,    backends: [npu],    provider: lemonade }
      - { id: gemma3-4b-FLM,        params: 4B,    backends: [npu],    provider: lemonade }
    large:
      - { id: qwen3.5-9b-FLM,       params: 9B,    backends: [npu],    provider: lemonade }
      - { id: qwen3-8b-FLM,         params: 8B,    backends: [npu],    provider: lemonade }
      - { id: deepseek-r1-8b-FLM,   params: 8B,    backends: [npu],    provider: lemonade }
      - { id: llama3.1-8b-FLM,      params: 8B,    backends: [npu],    provider: lemonade }
      - { id: gpt-oss-20b-FLM,      params: 20B,   backends: [npu],    provider: lemonade }

  # ── Code ───────────────────────────────────────────────────────────
  code:
    small:
      - id: qwen3-tk-4b-FLM
        note: "tool-calling variant doubles as code assistant on NPU"
        backends: [npu]
        status: installed
        provider: lemonade
    medium:
      - id: Qwen3-Coder-30B-A3B-Instruct-GGUF
        params: 30B-MoE
        quant: Q4_K_M
        footprint_gb: 18.6
        backends: [vulkan, cpu]
        status: installed
        provider: lemonade
    large:
      - id: cloud_zai_glm51
        note: "ZAI GLM 5.1 cloud — strategic/complex code tasks only"
        backends: [cloud]
        provider: cloud_zai

  # ── Embeddings ─────────────────────────────────────────────────────
  embedding:
    small:
      - id: embed-gemma-300m-FLM
        params: 300M
        footprint_gb: 0.62
        dims: 256
        backends: [npu]
        status: installed
        provider: lemonade
      - id: nomic-embed-text:latest
        params: 137M
        quant: F16
        footprint_gb: 0.3
        dims: 768
        backends: [cuda]
        status: installed
        provider: ollama
    medium:
      # Available but not downloaded
      - { id: nomic-embed-text-v2-moe-GGUF, backends: [vulkan, cpu], provider: lemonade }
      - { id: Qwen3-Embedding-0.6B-GGUF,    backends: [vulkan, cpu], provider: lemonade }
    large:
      - { id: Qwen3-Embedding-4B-GGUF,      backends: [vulkan, cpu], provider: lemonade }
      - { id: Qwen3-Embedding-8B-GGUF,      backends: [vulkan, cpu], provider: lemonade }

  # ── Transcription (STT) ───────────────────────────────────────────
  transcription:
    small:
      - id: whisper-v3-turbo-FLM
        params: 809M
        quant: Q4_1
        footprint_gb: 0.62
        backends: [npu]
        status: installed
        provider: lemonade
        note: "primary — power-efficient always-on transcription"
    medium:
      # Available but not downloaded
      - { id: Whisper-Small,     params: 244M, backends: [cpu],  provider: lemonade, recipe: whispercpp }
      - { id: Whisper-Medium,    params: 769M, backends: [cpu],  provider: lemonade, recipe: whispercpp }
    large:
      - { id: Whisper-Large-v3,  params: 1.5B, backends: [cpu],  provider: lemonade, recipe: whispercpp }

  # ── Text-to-Speech (TTS) ──────────────────────────────────────────
  tts:
    small:
      - id: kokoro-v1
        params: 82M
        format: onnx
        footprint_gb: 0.34
        sample_rate: 24000
        multi_voice: true
        multi_language: true
        backends: [cpu]
        status: installed
        provider: lemonade
        api: "/v1/audio/speech"
        note: "primary TTS — replaces piper-tts and pocket-tts pip packages"

  # ── Vision ─────────────────────────────────────────────────────────
  vision:
    small:
      - id: qwen3.5-4b-FLM
        params: 4B
        backends: [npu]
        status: installed
        provider: lemonade
        note: "VLM — vision + reasoning + tool-calling on NPU"
    medium:
      # Available but not downloaded
      - { id: qwen3vl-it-4b-FLM,            backends: [npu],    provider: lemonade }
      - { id: qwen2.5vl-it-3b-FLM,          backends: [npu],    provider: lemonade }
      - { id: Qwen2.5-VL-3B-Instruct-GGUF,  backends: [vulkan, cpu], provider: lemonade }
    large:
      - id: gemma-4-26B-A4B-it-GGUF
        params: 26B-MoE
        backends: [vulkan]
        status: installed
        provider: lm_studio
    cloud_fallback:
      - id: glm-4.5v
        backends: [cloud]
        provider: cloud_zai
        cost_per_m_in: 0.60
        cost_per_m_out: 1.80
        context_window: 64000
        note: "Cloud standby — used when local vision fails or quality requirements are high"

  # ── Audio (speech-in + speech-out) ─────────────────────────────────
  audio:
    small:
      # Available but not downloaded
      - { id: LFM2.5-Audio-1.5B-GGUF, params: 1.5B, backends: [vulkan, cpu], provider: lm_studio, status: installed, note: "LiquidAI audio model with vocoder" }

  # ── Reranking ──────────────────────────────────────────────────────
  reranking:
    small:
      - { id: jina-reranker-v1-tiny-en-GGUF, backends: [vulkan, cpu], provider: lemonade }
    medium:
      - { id: bge-reranker-v2-m3-GGUF,       backends: [vulkan, cpu], provider: lemonade }

  # ── Translation ────────────────────────────────────────────────────
