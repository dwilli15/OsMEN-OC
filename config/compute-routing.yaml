      - { id: translategemma-4b-FLM, params: 4B, backends: [npu], provider: lemonade }

  # ── Image Generation ───────────────────────────────────────────────
  image:
    small:
      - { id: Flux-2-Klein-4B,   backends: [cpu], provider: lemonade, recipe: sd-cpp }
