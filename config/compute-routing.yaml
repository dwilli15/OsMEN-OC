      - { id: Flux-2-Klein-9B-GGUF, backends: [cpu], provider: lemonade, recipe: sd-cpp }

# ─── Backend Allocation Strategy ────────────────────────────────────────
# Maps the four-tier hierarchy from the orchestration codex to concrete
# provider endpoints and models. The inference router matches task
# requirements to the cheapest sufficient tier.
#
# Tier definitions (from orchestration handoff):
#   swarm_local_fast:    0.6-1B models, NPU, <50ms/call, 3-5 calls/task
#   worker_local_medium: 2-4B models, NPU preferred (fallback Vulkan), 1-5s/call
#   gpu_local_large:     7-9B+ on RTX 5070 CUDA, local fallback synthesis
#   cloud_elite:         ZAI GLM 5.1 / GLM 4.7, strategic tasks only

backend_tiers:
  swarm_local_fast:
    target_compute: npu
    fallback: cpu
    models:
      - qwen3-0.6b-FLM         # tagging, dedup, contradiction hints
      - embed-gemma-300m-FLM   # continuous embedding
    max_latency_ms: 50
    calls_per_task: 3-5

  worker_local_medium:
    target_compute: npu
    fallback: amd_vulkan
    models:
      - qwen3-tk-4b-FLM        # reasoning + tool calling
      - qwen3.5-4b-FLM         # vision + reasoning + tool calling
      - whisper-v3-turbo-FLM   # transcription
      - kokoro-v1              # TTS
    max_latency_ms: 5000
    calls_per_task: 5-10

  gpu_local_large:
    target_compute: nvidia
    fallback: amd_vulkan
    models:
      - gemma4:latest           # 8B CUDA
      - Qwen3-Coder-30B-A3B-Instruct-GGUF  # 30B MoE Vulkan
      - GLM-4.7-Flash-GGUF     # 9B Vulkan
      - gemma-4-26B-A4B-it-GGUF  # 26B MoE vision Vulkan
      - LFM2-24B-A2B-GGUF      # 24B MoE Vulkan
    max_latency_ms: 30000
    calls_per_task: 1-3

  cloud_elite:
    target_compute: cloud
    models:
      - glm-5.1                 # strategic decomposition, tie-break, final answer
      - glm-4.7                 # fallback cloud
    max_latency_ms: 30000
    calls_per_task: 0-1
    cost_target_per_10_turns: 0.01

# ─── NPU Queue Discipline ──────────────────────────────────────────────
# The NPU is a serialized specialist. Lemonade max_loaded_models=1.
# Keep one or two models warm. Many cold starts > short wait for warm model.
# The router should maintain a hot-model LRU and prefer warm models.
npu_policy:
  max_loaded_models: 1
  warm_priority:
    - qwen3-tk-4b-FLM         # default hot model (reasoning + tools)
    - embed-gemma-300m-FLM    # swap in for embedding bursts
    - whisper-v3-turbo-FLM    # swap in for transcription
  cold_start_penalty_ms: 3000
  prefer_warm_over_optimal: true

# ─── Deprecated / Superseded Models ────────────────────────────────────
# These models remain on disk but should not be routed to by default.
# Marked for cleanup to reclaim storage.
deprecated:
  - id: Qwen3.5-4B-GGUF
    reason: "Duplicate of qwen3.5-4b-FLM — same base model, GGUF format is redundant when NPU variant exists"
    saves_gb: 3.4
    provider: lemonade
  - id: faster-whisper-small
    reason: "Superseded by whisper-v3-turbo-FLM on NPU (v3 Turbo > small, NPU > CPU)"
    saves_gb: 0.5
    location: "~/.cache/huggingface/hub/models--Systran--faster-whisper-small"
  - id: LFM2.5-1.2B-Instruct-Q8_0 (lmstudio-community duplicate)
    reason: "Exact duplicate of LiquidAI/LFM2.5-1.2B-Instruct-GGUF"
    saves_gb: 1.2
    provider: lm_studio

# ---------------------------------------------------------------------------
# Gaming GPU Rules (P20.6)
# ---------------------------------------------------------------------------
# When Steam/Proton or XIVLauncher is running, the NVIDIA dGPU should be
# available for gaming.  OsMEN inference workloads should fall back to
# Vulkan/AMD or CPU during active gaming sessions.
#
# compute-routing already defines a priority system:
#   1. nvidia (CUDA) — highest priority for ML workloads
#   2. amd_vulkan — fallback
#   3. cpu — lowest priority
#
# When a game is detected running (via system_monitor), the routing
# engine should temporarily deprioritize nvidia to avoid VRAM contention
# with the game's GPU usage.
#
# Manual override: set environment variable OSMEN_COMPUTE=vulkan to force
# Vulkan-only inference during gaming sessions.
