# Public-safe template for OAuth token backups.
# Runtime tokens are managed by the provider CLI keyring (for Google, `gog`).
# Local encrypted backup lives at ~/.config/osmen/secrets/oauth-tokens.enc.yaml.
# Populate after running the provider's native auth flow and capturing the token snapshot locally.

# Shape matches `gog auth tokens export <email>` output.
google:
  client: "<set-locally>"
  created_at: "<set-locally>"
  email: "<set-locally>"
  refresh_token: "<set-locally>"
  scopes: "<set-locally>"
  services: "<set-locally>"

microsoft:
  email: "<set-locally>"
  access_token: "<set-locally>"
  refresh_token: "<set-locally>"
  token_expiry: "<set-locally>"
  tenant_id: "<set-locally>"
  client_id: "<set-locally>"
  scopes:
    - "Mail.ReadWrite"
    - "Calendars.ReadWrite"
