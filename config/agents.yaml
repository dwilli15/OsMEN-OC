# Agent runtime configuration
# Values loaded by core/utils/config.py; ${ENV_VAR} tokens resolved from environment.

defaults:
  # Maximum wall-clock seconds a single tool invocation may run before timeout.
  tool_timeout_seconds: 30
  # Directory containing agent YAML manifests (relative to project root).
  agents_dir: agents

# Per-agent overrides — keys must match agent_id values in agents/*.yaml
daily_brief:
  schedule: "0 7 * * *"  # cron: 07:00 daily
  model_tier: cloud-primary
  # LLM provider API key reference (resolved from SOPS secrets at runtime)
  llm_api_key: "${ZAI_API_KEY}"

knowledge_librarian:
  schedule: event-driven
  model_tier: cloud-primary
  llm_api_key: "${ZAI_API_KEY}"
  chromadb_collection: knowledge

media_organization:
  schedule: event-driven
  model_tier: local-medium
  plex_library_root: "${PLEX_LIBRARY_ROOT}"
  download_staging: "${DOWNLOAD_STAGING_DIR}"

# Database connection — set exactly ONE of the following env vars before starting the gateway.
# The gateway reads these directly from the environment (not from this file).
#
# Option A — self-hosted (default, osmen-core-postgres Podman container):
#   export DATABASE_URL="postgresql://osmen:<password>@127.0.0.1:5432/osmen"
#
# Option B — Supabase free tier (no local Postgres container required):
#   export SUPABASE_DB_URL="postgresql://postgres:<password>@db.<project>.supabase.co:5432/postgres"
#   The gateway uses SUPABASE_DB_URL as a fallback when DATABASE_URL is absent.
#   Obtain it from: Supabase Dashboard → Project → Settings → Database → Connection string.
#   NOTE: Supabase free projects auto-pause after 7 days of inactivity.
