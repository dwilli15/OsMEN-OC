# Pipeline routing configuration
# Defines which agents handle each event type on the Redis Streams event bus.
# Stream key format: events:{domain}:{category}

pipelines:
  - id: morning_brief
    trigger:
      type: cron
      schedule: "0 7 * * *"
    steps:
      - agent: daily_brief
        tool: fetch_task_summary
      - agent: daily_brief
        tool: generate_brief
        parameters:
          period: morning

  - id: evening_brief
    trigger:
      type: cron
      schedule: "0 19 * * *"
    steps:
      - agent: daily_brief
        tool: generate_brief
        parameters:
          period: evening

  - id: knowledge_ingest
    trigger:
      type: event
      stream: "events:knowledge:ingest_requested"
    steps:
      - agent: knowledge_librarian
        tool: ingest_url

  - id: media_transfer
    trigger:
      type: event
      stream: "events:media:download_complete"
    steps:
      - agent: media_organization
        tool: audit_vpn
      - agent: media_organization
        tool: transfer_to_plex
      - agent: media_organization
        tool: purge_completed

  - id: boot_hardening_weekly
    trigger:
      type: cron
      schedule: "0 3 * * 0"
    steps:
      - agent: boot_hardening
        tool: check_ufw_rules
      - agent: boot_hardening
        tool: check_fail2ban
      - agent: boot_hardening
        tool: verify_luks_headers
      - agent: boot_hardening
        tool: verify_secure_boot

  - id: focus_check_hourly
    trigger:
      type: cron
      schedule: "0 9-22 * * *"
    steps:
      - agent: focus_guardrails
        tool: get_focus_status
      - agent: focus_guardrails
        tool: send_break_reminder

  - id: taskwarrior_sync_periodic
    trigger:
      type: cron
      schedule: "*/15 * * * *"
    steps:
      - agent: taskwarrior_sync
        tool: sync_tasks

  - id: hardware_health_check
    trigger:
      type: cron
      schedule: "*/5 * * * *"
    steps:
      - agent: system_monitor
        tool: get_thermal_status
      - agent: system_monitor
        tool: get_gpu_status

  - id: research_request
    trigger:
      type: event
      stream: "events:knowledge:research_requested"
    steps:
      - agent: research
        tool: web_search
      - agent: research
        tool: answer_from_knowledge
