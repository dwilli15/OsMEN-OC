# OsMEN-OC Secrets Registry
# Single source of truth for what secrets exist, where they live, and rotation policy.
# NO secret values in this file. Metadata only.
# Updated by: secrets_custodian agent (audit_secrets tool)
#
# Store locations:
#   env    = ~/.config/osmen/env (shell-sourceable, chmod 600)
#   sops   = ~/.config/osmen/secrets/*.enc.yaml (age-encrypted)
#   podman = podman secret (file driver, injected into containers)
#   keyring = CLI-managed keystore (gh, gog, etc.)
#   openclaw = OpenClaw SecretRef (env-backed via openclaw.json / auth-profiles.json)

secrets:
  # ── API Keys ─────────────────────────────────────────────────
  zai_api_key:
    description: "Zhipu GLM API key (primary LLM provider)"
    stores: [env, sops, openclaw]
    rotation: manual
    required_by: [daily_brief, knowledge_librarian, focus_guardrails, research]
    env_var: ZAI_API_KEY
    sops_file: api-keys.enc.yaml
    openclaw_ref: "auth-profiles:zai:default.keyRef"

  google_places_api_key:
    description: "Google Places API key for goplaces skill"
    stores: [env, openclaw]
    rotation: manual
    required_by: [openclaw]
    env_var: GOOGLE_PLACES_API_KEY
    openclaw_ref: "skills.entries.goplaces.apiKey"

  # ── Messaging Tokens ────────────────────────────────────────
  telegram_bot_token:
    description: "Telegram Bot API token"
    stores: [env, openclaw]
    rotation: manual
    required_by: [openclaw]
    env_var: TELEGRAM_BOT_TOKEN
    openclaw_ref: "channels.telegram.botToken"

  telegram_chat_id:
    description: "Telegram chat ID for notifications"
    stores: [env]
    rotation: never
    required_by: [openclaw]
    env_var: TELEGRAM_CHAT_ID

  discord_bot_token:
    description: "Discord bot token"
    stores: [env, openclaw]
    rotation: manual
    required_by: [openclaw]
    env_var: DISCORD_BOT_TOKEN
    openclaw_ref: "channels.discord.token"

  discord_guild_id:
    description: "Discord guild (server) ID"
    stores: [env]
    rotation: never
    required_by: [openclaw]
    env_var: DISCORD_GUILD_ID

  # ── Infrastructure Credentials ──────────────────────────────
  postgres_password:
    description: "PostgreSQL osmen user password"
    stores: [env, sops, podman]
    rotation: 90d
    required_by: [gateway, migrations]
    env_var: POSTGRES_DSN
    sops_file: api-keys.enc.yaml
    podman_name: osmen-postgres-password

  redis_password:
    description: "Redis password"
    stores: [sops, podman]
    rotation: 90d
    required_by: [gateway, events]
    sops_file: api-keys.enc.yaml
    podman_name: osmen-redis-password

  chromadb_token:
    description: "ChromaDB authentication token"
    stores: [sops, podman]
    rotation: 90d
    required_by: [knowledge_librarian, research]
    sops_file: api-keys.enc.yaml
    podman_name: osmen-chromadb-token

  # ── Gateway / Bridge ────────────────────────────────────────
  openclaw_gateway_token:
    description: "OpenClaw gateway auth token"
    stores: [env, sops, podman, openclaw]
    rotation: manual
    required_by: [gateway, openclaw]
    env_var: OPENCLAW_GATEWAY_TOKEN
    sops_file: api-keys.enc.yaml
    podman_name: osmen-openclaw-gateway-token
    openclaw_ref: "gateway.auth.token"

  openclaw_ws_url:
    description: "OpenClaw WebSocket endpoint"
    stores: [env]
    rotation: never
    required_by: [bridge]
    env_var: OPENCLAW_WS_URL

  # ── GitHub ──────────────────────────────────────────────────
  gh_token:
    description: "GitHub personal access token"
    stores: [sops, keyring]
    rotation: manual
    required_by: [openclaw]
    sops_file: gh-token.enc.yaml
    keyring_cli: gh

  github_copilot_token:
    description: "GitHub Copilot auth token"
    stores: [env, openclaw]
    rotation: auto-refresh
    required_by: [openclaw]
    env_var: GITHUB_COPILOT_TOKEN
    openclaw_ref: "auth-profiles:github-copilot:github.tokenRef"

  # ── Media / VPN ─────────────────────────────────────────────
  # plex_claim_token: removed — Plex now runs natively via .deb, not container.

  vpn_wireguard_private_key:
    description: "WireGuard VPN private key for gluetun"
    stores: [sops, podman]
    rotation: manual
    required_by: [gluetun]
    sops_file: api-keys.enc.yaml
    podman_name: osmen-vpn-wireguard-private-key

  vpn_wireguard_addresses:
    description: "WireGuard VPN address allocation"
    stores: [podman]
    rotation: manual
    required_by: [gluetun]
    podman_name: osmen-vpn-wireguard-addresses

  siyuan_auth_code:
    description: "SiYuan note app auth code"
    stores: [sops, podman]
    rotation: manual
    required_by: [siyuan]
    sops_file: api-keys.enc.yaml
    podman_name: osmen-siyuan-auth

  # ── Local / Non-sensitive ───────────────────────────────────
  ollama_api_key:
    description: "Ollama local API key (placeholder)"
    stores: [env, openclaw]
    rotation: never
    required_by: [openclaw]
    env_var: OLLAMA_API_KEY
    openclaw_ref: "auth-profiles:ollama:default.keyRef"

  copilot_proxy_token:
    description: "Copilot proxy local token (placeholder)"
    stores: [env, openclaw]
    rotation: never
    required_by: [openclaw]
    env_var: COPILOT_PROXY_TOKEN
    openclaw_ref: "auth-profiles:copilot-proxy:local.tokenRef"

  # ── Media Paths (non-secret but tracked) ────────────────────
  plex_library_root:
    description: "Plex media library root path"
    stores: [env]
    rotation: never
    required_by: [media_organization]
    env_var: PLEX_LIBRARY_ROOT

  download_staging_dir:
    description: "Download staging directory"
    stores: [env]
    rotation: never
    required_by: [media_organization]
    env_var: DOWNLOAD_STAGING_DIR

  # ── OAuth / Keyring ─────────────────────────────────────────
  google_oauth_tokens:
    description: "Google OAuth2 client + refresh token (Calendar read-only; expand scopes incrementally)"
    stores: [sops, keyring]
    rotation: auto-refresh
    required_by: [taskwarrior_sync]
    auth_flow: "gog auth credentials set <credentials.json> && gog auth add <email> --services calendar --readonly"
    sops_file: oauth-tokens.enc.yaml
    keyring_cli: gog
    status: provisioned

  microsoft_oauth_tokens:
    description: "Microsoft OAuth2 tokens (Outlook, Calendar)"
    stores: [sops]
    rotation: auto-refresh
    required_by: []
    auth_flow: "himalaya account configure"
    status: not-provisioned

# ── Encryption ─────────────────────────────────────────────────
encryption:
  tool: sops
  backend: age
  key_path: "~/.config/sops/age/keys.txt"
  # recipient derived at runtime from key_path — not stored in repo

# ── Hard-Copy Export ───────────────────────────────────────────
credential_kit:
  script: "scripts/secrets/export_credential_kit.sh"
  output_dir: "~/.local/share/osmen/credential-kit"
  max_age_days: 7
