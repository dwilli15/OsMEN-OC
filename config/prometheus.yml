# OsMEN-OC Prometheus configuration.
# Opt-in via P21 — basic targets for service monitoring.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "osmen-gateway"
    static_configs:
      - targets: ["host.containers.internal:18788"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets: ["host.containers.internal:9100"]

  - job_name: "caddy"
    static_configs:
      - targets: ["host.containers.internal:2019"]
    metrics_path: /metrics
