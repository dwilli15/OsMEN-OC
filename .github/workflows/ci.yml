name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, Lint, Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit bandit

      - name: Run tests with coverage
        run: python -m pytest tests/ -q --cov=core --cov-report=term-missing --cov-fail-under=80

      - name: Lint (ruff)
        run: python -m ruff check core/ tests/

      - name: Type-check (mypy)
        run: python -m mypy core/ --ignore-missing-imports

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --skip-editable

      - name: Security lint (bandit)
        run: python -m bandit -r core/ -q -c pyproject.toml

      - name: Validate quadlet syntax
        run: |
          for f in quadlets/core/*.container; do
            echo "Checking $f ..."
            grep -q '^\[Container\]' "$f" || { echo "FAIL: missing [Container] in $f"; exit 1; }
          done
