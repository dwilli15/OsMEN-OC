# tmux config for OsMEN launcher session
# Scoped to this session only via: tmux -f this-file

# Tab bar at top, minimal style
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left ""
set -g status-right ""

# Tab format
set -g window-status-format " #I: #W "
set -g window-status-current-format " #I: #W "
set -g window-status-current-style "bg=#45475a,fg=#cdd6f4,bold"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Mouse support
set -g mouse on

# No escape delay (important for vim/claude keybindings)
set -sg escape-time 0

# 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
